<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/cadastro.css" />

    <title>Cadastro - LISBlog</title>

    <!-- fontes-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Loop:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="corpo">

      <!-- parte do cadastro -->
      <div class="container">
        <header>
          <nav class="navBar">
            <img class="logo" src="./assets/imgs/Logo.png" />
            <div class="menu">
              <a href="./index.html">Home</a>
            </div>
          </nav>
        </header>

        <div class="area-cadastro">
          <h1>Criar Conta</h1>
          <h3>𖦹 Essa ação terá consequências</h3>

          <div class="inputs">
            <p>
              Nome completo<span id="erroNome" class="mensagem_erro"></span>
            </p>
            <input
              type="text"
              id="ipt_nome"
              placeholder="𖨆  Insira seu nome completo"
            />

            <p>Nickname<span id="erroNick" class="mensagem_erro"></span></p>
            <input
              type="text"
              id="ipt_NickName"
              placeholder="🜲  Insira seu Nickname"
            />

            <p>E-mail<span id="erroEmail" class="mensagem_erro"></span></p>
            <input
              type="text"
              id="ipt_email"
              placeholder="✉ Insira seu e-mail"
            />

            <p>Senha<span id="erroSenha" class="mensagem_erro"></span></p>
            <input
              type="text"
              id="ipt_senha"
              placeholder="🔒︎ Insira sua senha"
            />

            <p>Foto de perfil</p>
            <button onclick="abrirSelecao()">
            <img id="escolhaFoto" src="./assets/imgs/FotosPerfil/placeholder.jpg"/>
            <span id="texto_foto">Escolher foto de perfil</span>
            </button>
          </div>

          <button class="botao" onclick="cadastrar()">Criar conta</button>
          <div id="texto" class="mensagem_erro"></div>
        </div>
      </div>

      <div class="selecao_fundo" id="selecao_fundo">
        <div class="selecao">
          <div class="topo">
            <h2>Escolha sua foto de perfil</h2>
            <button class="fechar" onclick="fecharSelecao()">✕</button>
          </div>

          <div class="fotos" id="fotos">
            <div class="linha">
              <p class="nome">Alex</p>
              <div class="foto_linha" id="fotos_Alex"></div>
            </div>

            <div class="linha">
              <p class="nome">Chloe</p>
              <div class="foto_linha" id="fotos_Chloe"></div>
            </div>

            <div class="linha">
              <p class="nome">Daniel</p>
              <div class="foto_linha" id="fotos_Daniel"></div>
            </div>

            <div class="linha">
              <p class="nome">Max</p>
              <div class="foto_linha" id="fotos_Max"></div>
            </div>

            <div class="linha">
              <p class="nome">Rachel</p>
              <div class="foto_linha" id="fotos_Rachel"></div>
            </div>

            <div class="linha">
              <p class="nome">Sean</p>
              <div class="foto_linha" id="fotos_Sean"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- parte da imagem -->
      <div class="lado-imagem">
        <div class="botoes">
          <p>Já tem uma conta?</p>
          <a href="./login.html" class="cadastro">Faça seu login</a>
        </div>
      </div>
    </div>
  </body>
</html>

<script>

  let personagens = [
    { nome: "Alex", quantidade: 5 },
    { nome: "Chloe", quantidade: 5 },
    { nome: "Daniel", quantidade: 5 },
    { nome: "Max", quantidade: 5 },
    { nome: "Rachel", quantidade: 5 },
    { nome: "Sean", quantidade: 5 },
  ];

  for (let index = 0; index < personagens.length; index++) {
    let nome = personagens[index].nome;
    let quantidade = personagens[index].quantidade;

    for (let i = 1; i <= quantidade; i++) {
      document.getElementById(`fotos_${nome}`).innerHTML +=
        `<img src="./assets/imgs/FotosPerfil/${nome}${i}.jpg"
              id="${nome}${i}"
              class="foto_opcao"
              onclick="selecionarFoto('${nome}${i}')" />`;
    }
  }

  function abrirSelecao() {
    document.getElementById("selecao_fundo").style.display = "flex";
  }
 
  function fecharSelecao() {
    document.getElementById("selecao_fundo").style.display = "none";
  }

let todasFotos = [
    "Alex1", "Alex2", "Alex3", "Alex4", "Alex5",
    "Chloe1", "Chloe2", "Chloe3", "Chloe4", "Chloe5",
    "Daniel1", "Daniel2", "Daniel3", "Daniel4", "Daniel5",
    "Max1", "Max2", "Max3", "Max4", "Max5",
    "Rachel1", "Rachel2", "Rachel3", "Rachel4", "Rachel5",
    "Sean1", "Sean2", "Sean3", "Sean4", "Sean5"
];

var fotoSelecionada = `placeholder.jpg`;

function selecionarFoto(idFoto) {

    for (let i = 0; i < todasFotos.length; i++) {
        document.getElementById(todasFotos[i]).classList.remove("foto_selecionada");
    }

    document.getElementById(idFoto).classList.add("foto_selecionada");

    document.getElementById("escolhaFoto").src = `./assets/imgs/FotosPerfil/${idFoto}.jpg`;
    document.getElementById("texto_foto").innerHTML = `${idFoto} ✓`;

    fotoSelecionada = `${idFoto}.jpg`;

    fecharSelecao();
}


  function cadastrar() {
    var nomeVar = ipt_nome.value;
    var nicknameVar = ipt_NickName.value;
    var emailVar = ipt_email.value;
    var senhaVar = ipt_senha.value;

    erroNome.innerHTML = "";
    erroNick.innerHTML = "";
    erroEmail.innerHTML = "";
    erroSenha.innerHTML = "";

    // validações

    let temErro = false;
 
    if (nomeVar == "" || nomeVar.length < 3) {
      erroNome.innerHTML = ` ⓘ Toda história precisa de um autor, informe seu nome`;
      temErro = true;
    }
 
    if (nicknameVar == "") {
      erroNick.innerHTML = `ⓘ Escolha como você quer ser lembrado aqui, informe um Nickname`;
      temErro = true;
    }
 
    if (emailVar == "" || !emailVar.includes("@") || emailVar.length < 10) {
      erroEmail.innerHTML = ` ⓘ Você precisa deixar um caminho para voltar, por favor, informe um e-mail válido`;
      temErro = true;
    }
 
    if (senhaVar == "" || senhaVar.length < 10 ) {
      erroSenha.innerHTML = ` ⓘ Memórias importantes precisam de proteção, tenha pelo menos 10 caracteres`;
      temErro = true;
    }
 
    if (temErro == true) {
      return false;
    }


    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        nicknameServer: nicknameVar,
        fotoServer: fotoSelecionada
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          texto.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "./login.html";
          }, "2000");

        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });

    return false;
  }

</script>
