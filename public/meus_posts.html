<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./css/meus_posts.css" />

  <!-- fontes-->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Loop:ital@0;1&display=swap" rel="stylesheet" />
</head>

<body>

  <!-- NavBar-->
  <nav class="navBar">

    <img class="logo" src="./assets/imgs/Logo.png" alt="LisBlog" />

    <div class="menu">
      <a href="./posts.html">⌂ Feed</a>
      <a href="./meus_posts.html">🖹 Meus posts</a>
      <a href="./memorias.html">♡ Minhas memorias</a>
      <a href="/dashboard.html">✎ Resumo</a>
      <a href="./index.html">➜] Sair</a>
    </div>

    <div class="usuario_perfil">
        <img class="foto_perfil" id="foto_perfil" src="" />
        <div class="usuario_info">
          <span class="usuario_nome" id="usuario_nome"></span>
          <span class="usuario_nick" id="usuario_nick"></span>
        </div>
      </div>

  </nav>


  <!-- Área meus posts -->

  <div class="container">

    <!-- Perfil usuário -->
    <div>
        <img class="foto_perfil" id="foto_perfil" src="" />
        <div class="usuario_info">
          <span class="usuario_nome" id="usuario_nome">aaaa</span>
          <span class="usuario_nick" id="usuario_nick">aaaaa</span>
    </div>

    <div class="titulo">
      <h1>Meus posts</h1>
      <p>Tudo que você já escreveu por aqui ✎</p>
    </div>

    <div class="filtros">
      <button id="Todos" class="botao_filtro botao_selecionado" onclick="filtrar('Todos')">Todos</button>
      <button id="Alegria" class="botao_filtro" onclick="filtrar('Alegria')">Alegria</button>
      <button id="Alivio" class="botao_filtro" onclick="filtrar('Alivio')">Alivio</button>
      <button id="Ansiedade" class="botao_filtro" onclick="filtrar('Ansiedade')">Ansiedade</button>
      <button id="Culpa" class="botao_filtro" onclick="filtrar('Culpa')">Culpa</button>
      <button id="Esperanca" class="botao_filtro" onclick="filtrar('Esperanca')">Esperança</button>
      <button id="Medo" class="botao_filtro" onclick="filtrar('Medo')">Medo</button>
      <button id="Paz" class="botao_filtro" onclick="filtrar('Paz')">Paz</button>
      <button id="Raiva" class="botao_filtro" onclick="filtrar('Raiva')">Raiva</button>
      <button id="Tristeza" class="botao_filtro" onclick="filtrar('Tristeza')">Tristeza</button>
    </div>

    <!-- Feed -->

    <div class="feed" id="feed">      
        </div>
      </div>
</body>
</html>


<script>


  // colocando informações do usuário logado nos campos necessários
  var idUsuario = sessionStorage.ID_USUARIO;
  var nomeUsuario = sessionStorage.NOME_USUARIO;
  var nicknameUsuario = sessionStorage.NICKNAME_USUARIO;
  var fotoUsuario = sessionStorage.FOTO_USUARIO;

  if (idUsuario == null || nomeUsuario == null) {
    window.location = "./login.html";
  }

  document.getElementById("usuario_nome").innerHTML = nomeUsuario;
  document.getElementById("usuario_nick").innerHTML = `@${nicknameUsuario}`;
  document.getElementById("foto_perfil").src =
    `./assets/imgs/FotosPerfil/${fotoUsuario}`;

  function corSentimento(sentimento) {
    if (sentimento == "Alegria") {
        return "sentimento_alegria";
    } else if (sentimento == "Alivio") {
        return "sentimento_alivio";
    } else if (sentimento == "Ansiedade") {
        return "sentimento_ansiedade";
    } else if (sentimento == "Culpa") {
        return "sentimento_culpa";
    } else if (sentimento == "Esperanca") {
        return "sentimento_esperanca";
    } else if (sentimento == "Medo") {
        return "sentimento_medo";
    } else if (sentimento == "Paz") {
        return "sentimento_paz";
    } else if (sentimento == "Raiva") {
        return "sentimento_raiva";
    } else if (sentimento == "Tristeza") {
        return "sentimento_tristeza";
    } else {
        return "sentimento";
    }
}


  function carregarMeusPosts() {
    fetch(`/postagens/listar/${idUsuario}`)
      .then(function (resposta) {
        if (resposta.ok) {
          resposta.json().then(function (listaPosts) {
            var feed = document.getElementById("feed");

            feed.innerHTML = "";
 
            for (let index = 0; index < listaPosts.length; index++) {
              let post = listaPosts[index];
 
              let dataFormatada = new Date(post.dtPostagem).toLocaleString("pt-BR", {
                day: "2-digit",
                month: "long",
                hour: "2-digit",
                minute: "2-digit"
              });
 
              let fotoSrc = `./assets/imgs/FotosPerfil/${post.fotoPerfil}`;
 
              let imgPost = "";
              if (post.fotoPost != null) {
                imgPost = `<img class="imagem_post" src="./assets/imgs/posts/${post.fotoPost}" style="display:block">`;
              }
 
              feed.innerHTML +=
                `<div class="post" id="post_${post.idPostagem}" data-sentimento="${post.sentimento}">
                  <div class="topo_post">
                    <div class="usuario">
                      <img src="${fotoSrc}">
                      <div>
                        <h3>${post.nome}</h3>
                        <span>${dataFormatada}</span>
                      </div>
                    </div>
                    <span class="sentimento ${corSentimento(post.sentimento)}">${post.sentimento}</span>
                  </div>
                  <p>${post.post}</p>
                  ${imgPost}
                  <div class="deletar" onclick="deletar(${post.idPostagem})">🗑</div>
                </div>`;
            }
          });
 
        } else if (resposta.status == 204) {
          document.getElementById("feed").innerHTML = "<p>Você ainda não escreveu nenhum post!</p>";
        }
      })
      .catch(function (erro) {
        console.log("Erro ao carregar posts: ", erro);
      });
  }


  // filtar postagem por sentimento

let todosBotoes = ["Todos", "Alegria", "Alivio", 
                   "Ansiedade", "Culpa", "Esperanca",
                   "Medo", "Paz", "Raiva", "Tristeza"];

function filtrar(sentimento) {

    for (let i = 0; i < todosBotoes.length; i++) {
        document.getElementById(todosBotoes[i]).classList.remove("botao_selecionado");
    }

    document.getElementById(sentimento).classList.add("botao_selecionado");

    var posts = document.getElementById("feed").children;
    for (let i = 0; i < posts.length; i++) {
        if (sentimento == "Todos" || posts[i].dataset.sentimento == sentimento) {
            posts[i].style.display = "block";
        } else {
            posts[i].style.display = "none";
        }
    }
}

function deletar(idPostagem){
  let consequencia = prompt(`Você tem certeza? lembre-se, essa ação tera consequências...`).toLowerCase()

  if(consequencia == 'nao' || consequencia == 'não'){
    console.log('respondeu nao')
  } else if(consequencia == 'sim') {
    console.log('respondeu sim')
    console.log("Criar função de apagar post escolhido - ID" + idPostagem);
    fetch(`/postagens/deletar/${idPostagem}`, {
            method: "DELETE",
            headers: {
                "Content-Type": "application/json"
            }
        }).then(function (resposta) {

            if (resposta.ok) {
                carregarMeusPosts();
            } else if (resposta.status == 404) {
                window.alert("Deu 404!");
            } else {
                throw ("Houve um erro ao tentar realizar a postagem! Código da resposta: " + resposta.status);
            }
        }).catch(function (resposta) {
            console.log(`#ERRO: ${resposta}`);
        });
    }

  }

  carregarMeusPosts();



</script>
