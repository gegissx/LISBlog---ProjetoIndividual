<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/dashboard.css" />

    <!-- fontes-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Loop:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <!-- NavBar-->
    <nav class="navBar">
      <img class="logo" src="./assets/imgs/Logo.png" alt="LisBlog" />

      <div class="menu">
        <a href="./posts.html">⌂ Feed</a>
        <a href="./meus_posts.html">🖹 Meus posts</a>
        <a href="./memorias.html">♡ Minhas memorias</a>
        <a href="./dashboard.html">✎ Resumo</a>
        <a href="./index.html">➜] Sair</a>
      </div>

      <div class="usuario_perfil">
        <img class="foto_perfil" id="foto_perfil" src="" />
        <div class="usuario_info">
          <span class="usuario_nome" id="usuario_nome"></span>
          <span class="usuario_nick" id="usuario_nick"></span>
        </div>
      </div>
    </nav>

    <div class="topo">
      <div class="titulo">
        <h1>Essa é sua Dashboard, <span id="usuarion_nome2"></span></h1>
        <h3>Aqui está um resumo da sua história até agora!</h3>
      </div>

      <img src="./assets/imgs/desenhoFarol.png" />
    </div>

    <div class="container">
      <!-- KPIS -->
      <div class="kpis">
        <div class="kpi">
          <img src="./assets/imgs/dashLapis.png" />
          <div>
            <h3>Posts Publicados</h3>
            <div class="info">
              <span id="kpi_posts"></span>
              <p class="cor1">capítulos</p>
            </div>
          </div>
        </div>

        <div class="kpi">
          <img src="./assets/imgs/dashCoracao.png" />
          <div>
            <h3>Curtidas recebidas</h3>
            <div class="info">
              <span id="kpi_curtidas"></span>
              <p class="cor3">curtidas</p>
            </div>
          </div>
        </div>

        <div class="kpi">
          <img src="./assets/imgs/dashPapel.png" />
          <div>
            <h3>Memórias salvas</h3>
            <div class="info">
              <span id="kpi_memorias"></span>
              <p class="cor4">memórias</p>
            </div>
          </div>
        </div>
      </div>

      <!-- GRÁFICOS -->
      <div class="graficos">
        <div class="grafico1">
          <h2>Posts ao longo do tempo</h2>
          <div class="configGrafico1">
            <canvas id="graficoLinha"></canvas>
          </div>
        </div>

        <div class="grafico2">
          <h2>Emoções mais frequentes</h2>
          <canvas id="graficoPizza"></canvas>
        </div>
      </div>
    </div>
  </body>
</html>

<script>

  // GRÁFICO DA LINHA DO TEMPO
  const LinhaDoTempo = new Chart(
    document.getElementById("graficoLinha"), {
    type: "line",
    data: {
      labels: [],
      datasets: [
        {
          fill: true,
          label: "Posts por mês",
          backgroundColor: "rgba(163, 177, 255, 0.208)",
          pointBackgroundColor: "rgb(163, 177, 255)",
          borderColor: "rgb(163, 177, 255)",
          data: [],
          borderWidth: 1,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          grid: { display: false },
          ticks: { maxRotation: 0 },
        },
        y: { grid: { drawTicks: false },
        ticks: {
          stepSize: 1,
        } },
      },
      elements: { point: { radius: 2.5 } },
    },
  });

  // GRÁFICO DE EMOÇÕES
    const Frequencia = new Chart(document.getElementById("graficoPizza"), {
    type: "doughnut",
    data: {
      labels: [],
      datasets: [
        {
          label: "Sentimentos",
          backgroundColor: [],
          data: [],
          borderWidth: 1,
        },
      ],
    },
    options: {
      cutout: "50%",
      plugins: {
        legend: {
          position: "right",
          labels: { usePointStyle: true, pointStyle: "circle", padding: 20 },
        },
      },
    },
  });
  

  // colocando informações do usuário logado nos campos necessários
  var idUsuario = sessionStorage.ID_USUARIO;
  var nomeUsuario = sessionStorage.NOME_USUARIO;
  var nicknameUsuario = sessionStorage.NICKNAME_USUARIO;
  var fotoUsuario = sessionStorage.FOTO_USUARIO;

  if (idUsuario == null || nomeUsuario == null) {
    window.location = "./login.html";
  }

  document.getElementById("usuario_nome").innerHTML = nomeUsuario;
  document.getElementById("usuario_nick").innerHTML = `@${nicknameUsuario}`;
  document.getElementById("foto_perfil").src =
    `./assets/imgs/FotosPerfil/${fotoUsuario}`;

  document.getElementById("usuarion_nome2").innerHTML = nomeUsuario;


  // carregar dados da dashboard
   let sentimentos = [
    { nome: "Alegria",   contagem: 0, cor: "#f7e98e" },
    { nome: "Alivio",    contagem: 0, cor: "#c8f0c8" },
    { nome: "Ansiedade", contagem: 0, cor: "#ffd6a5" },
    { nome: "Culpa",     contagem: 0, cor: "#34311467" },
    { nome: "Esperanca", contagem: 0, cor: "#1a7a4c96" },
    { nome: "Medo",      contagem: 0, cor: "#865ebd3d" },
    { nome: "Paz",       contagem: 0, cor: "#ffffff" },
    { nome: "Raiva",     contagem: 0, cor: "#ffb3b3" },
    { nome: "Tristeza",  contagem: 0, cor: "#b3c8e8" }
  ];
 
  fetch(`/postagens/listar/${idUsuario}`)
    .then(function (resposta) {
      if (resposta.ok) {
        resposta.json().then(function (listaPosts) {
 
          // KPIS
          let totalCurtidas = 0;
          let totalMemorias = 0;
 
          for (let index = 0; index < listaPosts.length; index++) {
            totalCurtidas += listaPosts[index].totalCurtidas;
            if (listaPosts[index].importante == 1) {
              totalMemorias++;
            }
          }
 
          kpi_posts.innerHTML = listaPosts.length;
          kpi_curtidas.innerHTML = totalCurtidas;
          kpi_memorias.innerHTML = totalMemorias;
 

          // Gráfico de emoções
          for (let index = 0; index < listaPosts.length; index++) {
            for (let i = 0; i < sentimentos.length; i++) {
              if (listaPosts[index].sentimento == sentimentos[i].nome) {
                sentimentos[i].contagem++;
              }
            }
          }
 
          let somaTotal = 0;
          for (let i = 0; i < sentimentos.length; i++) {
            somaTotal += sentimentos[i].contagem;
          }
 
          let labelsLegenda = [];
          let dadosGrafico = [];
          let coresGrafico = [];
 
          for (let index = 0; index < sentimentos.length; index++) {
            let porcentagem = 0;
            if (somaTotal > 0) {
              porcentagem = ((sentimentos[index].contagem / somaTotal) * 100).toFixed(1);
            }
            labelsLegenda.push(sentimentos[index].nome + " - " + porcentagem + "%");
            dadosGrafico.push(sentimentos[index].contagem);
            coresGrafico.push(sentimentos[index].cor);
          }
 
          Frequencia.data.labels = labelsLegenda;
          Frequencia.data.datasets[0].data = dadosGrafico;
          Frequencia.data.datasets[0].backgroundColor = coresGrafico;
          Frequencia.update();
 
          // Gráfico de linha — últimos 7 dias
          let hoje = new Date();
          let diasLabels = [];
          let diasContagem = [0, 0, 0, 0, 0, 0, 0];
 
          for (let i = 0; i < 7; i++) {
            let dia = new Date(hoje);
            dia.setDate(hoje.getDate() - (6 - i));
            diasLabels.push(dia.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" }));
 
            for (let j = 0; j < listaPosts.length; j++) {
              if (new Date(listaPosts[j].dtPostagem).toDateString() == dia.toDateString()) {
                diasContagem[i]++;
              }
            }
          }
 
          LinhaDoTempo.data.labels = diasLabels;
          LinhaDoTempo.data.datasets[0].data = diasContagem;
          LinhaDoTempo.update();
 
        });
      }
    })
    .catch(function (erro) {
      console.log("Erro ao carregar dashboard: ", erro);
    });
 
</script>
