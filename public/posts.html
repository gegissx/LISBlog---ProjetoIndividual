<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/posts.css" />

    <!-- fontes-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Loop:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- NavBar-->
    <nav class="navBar">
      <img class="logo" src="./assets/imgs/Logo.png" alt="LisBlog" />

      <div class="menu">
        <a href="./posts.html">⌂ Feed</a>
        <a href="./meus_posts.html">🖹 Meus posts</a>
        <a href="./memorias.html">♡ Painel de memórias</a>
        <a href="./dashboard.html">✎ Resumo</a>
        <a href="./index.html">➜] Sair</a>
      </div>

      <div class="usuario_perfil">
        <img class="foto_perfil" id="foto_perfil" src="" />
        <div class="usuario_info">
          <span class="usuario_nome" id="usuario_nome"></span>
          <span class="usuario_nick" id="usuario_nick"></span>
        </div>
      </div>
    </nav>

    <!--Aréa das postagens-->

    <div class="container">
      <div class="titulo">
        <h1>Que bom te ver por aqui, <span id="usuarion_nome2"></span></h1>
        <p>O que você vai escrever hoje?</p>
      </div>
      <br />

      <div class="postagem">
        <div class="cima">
          <textarea
            id="texto_postagem"
            maxlength="600"
            placeholder="✎𓂃 Escreva sobre o que você está vivendo..."
          ></textarea>
        </div>

        <img id="imagem_post" class="imagem_post" />

        <div class="baixo">
          <span
            ><select id="sentimentos">
              <option value="0"></option>
              <option value="Alegria">Alegria</option>
              <option value="Alivio">Alivio</option>
              <option value="Ansiedade">Ansiedade</option>
              <option value="Culpa">Culpa</option>
              <option value="Esperanca">Esperança</option>
              <option value="Medo">Medo</option>
              <option value="Paz">Paz</option>
              <option value="Raiva">Raiva</option>
              <option value="Tristeza">Tristeza</option></select
            >Escolher sentimento</span
          >

          <span
            ><input
              class="Input_imagem"
              type="file"
              id="ipt_imagem"
              onchange="verImagem()"
            />Adicionar imagem</span
          >

          <div class="Input_check">
            <input type="checkbox" id="ipt_importante" />
            <span>Memória especial</span>
          </div>

          <button onclick="enviar()">Enviar ➢</button>
        </div>
      </div>

      <!-- Feed -->

      <div class="feed" id="feed"></div>
    </div>
  </body>
</html>

<script>

  // colocando informações do usuário logado nos campos necessários
  var idUsuario = sessionStorage.ID_USUARIO;
  var nomeUsuario = sessionStorage.NOME_USUARIO;
  var nicknameUsuario = sessionStorage.NICKNAME_USUARIO;
  var fotoUsuario = sessionStorage.FOTO_USUARIO;

  if (idUsuario == null || nomeUsuario == null) {
    window.location = "./login.html";
  }

  document.getElementById("usuario_nome").innerHTML = nomeUsuario;
  document.getElementById("usuario_nick").innerHTML = `@${nicknameUsuario}`;
  document.getElementById("foto_perfil").src =
    `./assets/imgs/FotosPerfil/${fotoUsuario}`;

  document.getElementById("usuarion_nome2").innerHTML = nomeUsuario;

  // feed

  function corSentimento(sentimento) {
    if (sentimento == "Alegria") {
        return "sentimento_alegria";
    } else if (sentimento == "Alivio") {
        return "sentimento_alivio";
    } else if (sentimento == "Ansiedade") {
        return "sentimento_ansiedade";
    } else if (sentimento == "Culpa") {
        return "sentimento_culpa";
    } else if (sentimento == "Esperanca") {
        return "sentimento_esperanca";
    } else if (sentimento == "Medo") {
        return "sentimento_medo";
    } else if (sentimento == "Paz") {
        return "sentimento_paz";
    } else if (sentimento == "Raiva") {
        return "sentimento_raiva";
    } else if (sentimento == "Tristeza") {
        return "sentimento_tristeza";
    } else {
        return "sentimento";
    }
}

  function carregarFeed() {
    feed.innerHTML = "";

    fetch("/postagens/listar")
      .then(function (resposta) {
        if (resposta.ok) {
          resposta.json().then(function (listaPosts) {

            for (let index = 0; index < listaPosts.length; index++) {
              let post = listaPosts[index];

              let dataFormatada = new Date(post.dtPostagem).toLocaleString(
                "pt-BR",
                {
                  day: "2-digit",
                  month: "long",
                  hour: "2-digit",
                  minute: "2-digit",
                },
              );
              let fotoSrc = `./assets/imgs/FotosPerfil/${post.fotoPerfil}`;

              // imagem do post
              let imgPost = "";
              if (post.fotoPost != null) {
                imgPost = `<img class="imagem_post" src="./assets/imgs/posts/${post.fotoPost}" style="display:block">`;
              }

              feed.innerHTML += `<div class="post" id="post_${post.idPostagem}">

                  <div class="topo_post">

                  <div class="usuario">
                  <img src="${fotoSrc}"><div> <h3>${post.nickname}</h3><span>${dataFormatada}</span></div>
                    </div>
                    <span class="sentimento ${corSentimento(post.sentimento)}">${post.sentimento}</span>
                  </div>

                  <p>${post.post}</p>
                  ${imgPost}

                  <div class="interacao">
                    <button id="curtir_${post.idPostagem}" onclick="curtir(${post.idPostagem})">
                      <span id="coracao_${post.idPostagem}">🩶</span> <span id="qtdCoracao_${post.idPostagem}">${post.totalCurtidas}</span>
                    </button>
                  </div>
                </div>`;
            }
          verificarCurtidasFeed(listaPosts);
          });

        } 
      })
      .catch(function (erro) {
        console.log("Erro ao carregar feed: ", erro);
      });
  }

  // verificar se algum post do feed já foi curtido pelo usuário

  function verificarCurtidasFeed(listaPosts) {

    for (let index = 0; index < listaPosts.length; index++) {
      let idPostagem = listaPosts[index].idPostagem;

      fetch(`/postagens/curtir/${idUsuario}/${idPostagem}/verificar`)  
        .then(function (resposta) {
          if (resposta.ok) {
            resposta.json().then(function (resultado) {

              if (resultado.curtido == true) {
                document.getElementById(`coracao_${resultado.idPostagem}`).innerHTML = "💙";
              }   
            });
          }
        })
        .catch(function (erro) {
          console.log("Erro ao verificar curtida: ", erro);
        });
    }
  }

  // curtir e descurtir os posts

  function curtir(idPostagem) {
    fetch(`/postagens/curtir/${idUsuario}/${idPostagem}`, {
      method: "POST",
    })
      .then(function (resposta) {
        if (resposta.ok) {
          resposta.json().then(function (resultado) {
            let coracao = document.getElementById(`coracao_${idPostagem}`);
            let contadorCoracao = document.getElementById(`qtdCoracao_${idPostagem}`);
            let TotalCurtidas = Number(contadorCoracao.innerHTML);

            if (resultado.curtido == true) {
              coracao.innerHTML = "💙";
              TotalCurtidas ++;
            } else {
              coracao.innerHTML = "🩶";
              TotalCurtidas --;
            }

            contadorCoracao.innerHTML = TotalCurtidas;
          });
        }
      })
      .catch(function (erro) {
        console.log("Erro ao curtir: ", erro);
      });
  }

  // postar
  
  function enviar() {
    let post = texto_postagem.value;
    let selectSentimento = document.getElementById("sentimentos");
    let sentimento = selectSentimento.value;

    let importante = 0
    if (ipt_importante.checked){
      importante = 1
    }

    if (post == "") {
      alert("Até o silêncio precisa de algumas palavras. Você precisa escrever algo antes de continuar!");
      return false;
    }

    if (selectSentimento.value == "0") {
      alert("Toda memória carrega um sentimento. Escolha o sentimento que melhor representa esse momento!");
      return false;
    }

    const formData = new FormData();
    formData.append('post', post);
    formData.append('sentimento', sentimento);
    formData.append('importante', importante);
 
    if (ipt_imagem.files[0]) {
        formData.append('foto', ipt_imagem.files[0])};


    fetch("/postagens/publicar/" + idUsuario, {
      method: "POST",
      body: formData
      })
      .then(function (resposta) {
        if (resposta.ok) {

          texto_postagem.value = "";
          selectSentimento.value = "0";
          ipt_importante.checked = false;
          imagem_post.style.display = "none";
          imagem_post.src = "";

          carregarFeed();

        } else {
          console.log("Erro ao publicar");
        }
      })
      .catch(function (erro) {
        console.log("Erro: ", erro);
      });

  }

    function verImagem() {
    let arquivo = ipt_imagem.files[0];

    if (arquivo) {
      imagem_post.src = URL.createObjectURL(arquivo);
      imagem_post.style.display = "block";
    }
  }

  carregarFeed()
  
</script>
